<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a3656"/>
      <stop offset="0.5" stop-color="#141b2e"/>
      <stop offset="1" stop-color="#0a0e18"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="50%">
      <stop offset="0" stop-color="#f7a23b" stop-opacity="0.42"/>
      <stop offset="1" stop-color="#f7a23b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe39a"/>
      <stop offset="0.45" stop-color="#f7b53b"/>
      <stop offset="1" stop-color="#e8761f"/>
    </linearGradient>
    <linearGradient id="goldEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff4d0"/>
      <stop offset="1" stop-color="#c85a12"/>
    </linearGradient>
    <linearGradient id="band" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7b53b"/>
      <stop offset="1" stop-color="#b9560f"/>
    </linearGradient>
  </defs>

  <!-- background squircle -->
  <rect width="512" height="512" rx="118" fill="url(#bg)"/>
  <rect width="512" height="512" rx="118" fill="url(#glow)"/>
  <rect x="6" y="6" width="500" height="500" rx="114" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="3"/>

  <!-- crown -->
  <g stroke="url(#goldEdge)" stroke-width="6" stroke-linejoin="round">
    <path fill="url(#gold)"
      d="M150 312 L150 196 L205 244 L256 172 L307 244 L362 196 L362 312 Z"/>
    <!-- base band -->
    <rect x="142" y="312" width="228" height="46" rx="14" fill="url(#band)"/>
  </g>

  <!-- band rivets -->
  <g fill="#fff4d0" opacity="0.85">
    <circle cx="172" cy="335" r="6"/>
    <circle cx="256" cy="335" r="6"/>
    <circle cx="340" cy="335" r="6"/>
  </g>

  <!-- peak gems -->
  <circle cx="150" cy="190" r="15" fill="#5aa9ff" stroke="#fff4d0" stroke-width="4"/>
  <circle cx="256" cy="166" r="18" fill="#ff5d6c" stroke="#fff4d0" stroke-width="4"/>
  <circle cx="362" cy="190" r="15" fill="#5aa9ff" stroke="#fff4d0" stroke-width="4"/>

  <!-- top highlight on crown -->
  <path d="M150 196 L205 244 L256 172 L307 244 L362 196" fill="none"
    stroke="#fff7e0" stroke-opacity="0.55" stroke-width="4" stroke-linejoin="round"/>
</svg>
